<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setting Up Zenbu</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="chrome"></div>
  <div class="container">
    <div class="heading">Setting up Zenbu</div>
    <div class="subheading">One-time install — every step is idempotent.</div>

    <div class="steps" id="steps">
      <!-- steps rendered dynamically -->
    </div>

    <div class="log" id="log"></div>

    <div class="footer">
      <div>
        <div class="error-box" id="error"></div>
        <div class="success-msg" id="success"></div>
      </div>
      <button id="retryBtn" style="display:none">Retry</button>
    </div>
  </div>
  <script src="./setup.js"></script>
</body>
</html>
