name: Kernel Build Verify

on:
  workflow_dispatch:
  push:
    branches: [main, harden-install]
    paths:
      - "apps/kernel/**"
      - "packages/**"
      - "setup/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/kernel-build.yml"
  pull_request:
    paths:
      - "apps/kernel/**"
      - "packages/**"
      - "setup/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/kernel-build.yml"

concurrency:
  group: kernel-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: mac
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build JS bundle
        working-directory: apps/kernel
        run: pnpm run build

      - name: Package (unsigned, ${{ matrix.target }})
        working-directory: apps/kernel
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder --${{ matrix.target }} --publish never --config.mac.identity=null
